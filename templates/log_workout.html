    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body {

            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 600px;

        label i {

            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s;

        input:focus, select:focus, textarea:focus {

            border-color: #6b46c1;

        .btn-primary {
            background: #6b46c1;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-primary:hover {
            background: #553c9a;
            transform: translateY(-2px);
        }
        
        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #1f2937;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
        }
        
        .spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .animate {
            animation: slideIn 0.5s ease-out;
        }

            background: #f9fafb;
        }

<body>
    <div class="container animate">
        <h1>
            <i class="fas fa-dumbbell" style="color: #6b46c1;"></i>
            Log Your Workout
        </h1>
        
        <!-- Quick Add Templates -->
        <div class="quick-add">
            <div class="workout-card" onclick="selectTemplate('Upper Body', 300, 'Push-ups, Rows, Press', 30)">
                <div class="workout-icon">💪</div>
                <div class="workout-name">Upper Body</div>
                <div class="workout-desc">~300 cal • 30 min</div>
            </div>
            
            <div class="workout-card" onclick="selectTemplate('Lower Body', 350, 'Squats, Lunges, Deadlifts', 35)">
                <div class="workout-icon">🦵</div>
                <div class="workout-name">Lower Body</div>
                <div class="workout-desc">~350 cal • 35 min</div>
            </div>
            
            <div class="workout-card" onclick="selectTemplate('Cardio', 400, 'Running, Jumping Jacks', 30)">
                <div class="workout-icon">🏃</div>
                <div class="workout-name">Cardio</div>
                <div class="workout-desc">~400 cal • 30 min</div>
            </div>
            
            <div class="workout-card" onclick="selectTemplate('Full Body', 450, 'Burpees, Thrusters', 40)">
                <div class="workout-icon">⚡</div>
                <div class="workout-name">Full Body</div>
                <div class="workout-desc">~450 cal • 40 min</div>
            </div>
        </div>
        
        <!-- Main Form -->
        <form id="workoutForm" onsubmit="logWorkout(event)">

            <!-- Add this hidden input near the top of the form -->
            <input type="hidden" id="userWeight" value="{{ user.weight }}">

            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Date</label>
                <input type="date" id="workoutDate" class="date-input" value="{{ now.date() }}" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Workout Type</label>
                <select id="workoutType" required>
                    <option value="">Select workout type</option>
                    <option value="Upper Body">Upper Body</option>
                    <option value="Lower Body">Lower Body</option>
                    <option value="Cardio">Cardio</option>
                    <option value="Full Body">Full Body</option>
                    <option value="Core">Core/Abs</option>
                    <option value="Yoga">Yoga/Stretching</option>
                    <option value="HIIT">HIIT</option>
                    <option value="Strength">Strength Training</option>
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Duration (minutes)</label>
                <input type="number" id="duration" min="5" max="180" value="30" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-fire"></i> Calories Burned</label>
                <input type="number" id="calories" min="0" required>
                <small id="calorieCalcInfo" style="display: none; color: #6b46c1; margin-top: 0.25rem;"></small>
                <small style="color: #6b7280;">Auto-calculated based on workout type, duration, and your weight ({{ user.weight }} kg)</small>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-list"></i> Exercises Done</label>
                <textarea id="exercises" rows="3" placeholder="e.g., Push-ups, Rows, Press"></textarea>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-smile"></i> How did it feel?</label>
                <select id="mood">
                    <option value="great">💪 Great - Pushed hard!</option>
                    <option value="good">👍 Good - Solid workout</option>
                    <option value="okay">😐 Okay - Did my best</option>
                    <option value="tired">😴 Tired - Low energy</option>
                </select>
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn">
                <i class="fas fa-save"></i> Log Workout
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="/profile" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Profile
            </a>
        </div>
    </div>
    
    <script>
        // Function to fill template values
        function selectTemplate(type, calories, exercises, duration) {
    document.getElementById('workoutType').value = type;
    document.getElementById('calories').value = calories;
    document.getElementById('exercises').value = exercises;
    document.getElementById('duration').value = duration;
    
    // Highlight selected card
    document.querySelectorAll('.workout-card').forEach(card => {
        card.style.border = 'none';
    });
    event.currentTarget.style.border = '2px solid #6b46c1';
}
        
        // Main log workout function
        // Main log workout function
// Main log workout function
async function logWorkout(event) {
    event.preventDefault();
    
    // Get form values - matching your actual database model
    const workout = {
        type: document.getElementById('workoutType').value,  // Changed back to 'type' (not workout_type)
        duration: parseInt(document.getElementById('duration').value),
        calories: parseInt(document.getElementById('calories').value),  // Changed back to 'calories' (not calories_burned)
        exercises: document.getElementById('exercises').value,
        mood: document.getElementById('mood').value,
        date: document.getElementById('workoutDate').value
    };
    
    // Validate
    if (!workout.type) {
        alert('Please select a workout type');
        return;
    }
    
    // Show loading state
    const btn = document.getElementById('submitBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging...';
    btn.disabled = true;
    
    try {
        const response = await fetch('/log-workout', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(workout)
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('✅ Workout logged successfully!');
            window.location.href = '/progress';
        } else {
            alert('❌ Failed to log workout. Please try again.');
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    } catch (error) {
        console.error('Error:', error);
        alert('❌ Error logging workout. Please try again.');
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}
    
        
// Auto-calculation of calories
// Auto-calculation of calories
function calculateCalories() {
    console.log("calculateCalories called"); // Debug
    
    // Get values
    const workoutType = document.getElementById('workoutType').value;
    const duration = parseInt(document.getElementById('duration').value) || 0;
    
    // Get user weight from hidden input
    const userWeightInput = document.getElementById('userWeight');
    const userWeight = userWeightInput ? parseFloat(userWeightInput.value) : 70;
    
    console.log("Workout Type:", workoutType);
    console.log("Duration:", duration);
    console.log("User Weight:", userWeight);
    
    // MET values based on workout type
    const metValues = {
        'Upper Body': 5.0,
        'Lower Body': 6.0,
        'Cardio': 7.0,
        'Full Body': 8.0,
        'Core': 4.0,
        'Yoga': 3.0,
        'HIIT': 10.0,
        'Strength': 5.5
    };
    
    // Get MET value for selected workout type
    const met = metValues[workoutType] || 5.0;
    
    let calories = 0;
    if (duration > 0 && userWeight > 0 && workoutType) {
        calories = met * userWeight * (duration / 60);
        calories = Math.round(calories);
    }
    
    console.log("Calculated calories:", calories);
    
    // Update calories input field
    const caloriesInput = document.getElementById('calories');
    if (caloriesInput) {
        caloriesInput.value = calories;
        console.log("Calories input updated to:", calories);
    }
    
    // Show calculation info
    const calcInfo = document.getElementById('calorieCalcInfo');
    if (calcInfo && workoutType && duration > 0) {
        calcInfo.innerHTML = `📊 Calculated: ${met} MET × ${userWeight}kg × ${duration}min = ${calories} calories`;
        calcInfo.style.display = 'block';
    }
}
    
    

// Add event listeners when page loads
document.addEventListener('DOMContentLoaded', function() {
    applyDarkMode();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('workoutDate').value = today;

    const workoutTypeSelect = document.getElementById('workoutType');
    const durationInput = document.getElementById('duration');
    
    if (workoutTypeSelect) {
        workoutTypeSelect.addEventListener('change', calculateCalories);
    }
    if (durationInput) {
        durationInput.addEventListener('input', calculateCalories);
    }
    
    // Initial calculation
    calculateCalories();
});

</script>
