<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your 5-Day Schedule - FitAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: white;
        }
        
        .header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: white;
            color: #667eea;
        }
        
        .schedule-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .schedule-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed #e5e7eb;
        }
        
        .schedule-header h2 {
            color: #6b46c1;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .schedule-meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            color: #6b7280;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .schedule-content {
            background: #f9fafb;
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            font-size: 1rem;
            border: 1px solid #e5e7eb;
        }
        
        .day-card {
            background: #f9fafb;
            border-radius: 1rem;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 1.5rem;
        }
        
        .day-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .day-title {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .day-focus {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }
        
        .day-content {
            padding: 1.5rem;
        }
        
        .exercise-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .exercise-item:hover {
            background: #f3f4f6;
        }
        
        .exercise-number {
            width: 30px;
            height: 30px;
            background: #6b46c1;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 1rem;
        }
        
        .exercise-name {
            flex: 2;
            font-weight: 600;
            color: #1f2937;
        }
        
        .exercise-details {
            flex: 1;
            color: #6b46c1;
            font-weight: 600;
            text-align: right;
        }
        
        .tip-section {
            margin-top: 2rem;
            padding: 1rem;
            background: #f0f9ff;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .tip-icon {
            font-size: 2rem;
        }
        
        .tip-text {
            color: #0369a1;
            font-style: italic;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn-primary {
            background: white;
            color: #6b46c1;
            border: 2px solid white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: transparent;
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            background: white;
            color: #6b46c1;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .day-card {
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }
        
        .day-card:nth-child(1) { animation-delay: 0.1s; }
        .day-card:nth-child(2) { animation-delay: 0.2s; }
        .day-card:nth-child(3) { animation-delay: 0.3s; }
        .day-card:nth-child(4) { animation-delay: 0.4s; }
        .day-card:nth-child(5) { animation-delay: 0.5s; }
        
        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .exercise-item {
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }
            
            .exercise-number {
                margin-right: 0;
            }
            
            .exercise-details {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-calendar-alt"></i>
                Your 5-Day Schedule
            </h1>
            <a href="/dashboard" class="back-btn">
                <i class="fas fa-arrow-left"></i> Dashboard
            </a>
        </div>
        
        <div class="schedule-card">
            <div class="schedule-header">
                <h2>Personalized Workout Plan</h2>
                <div class="schedule-meta">
                    <span class="meta-item">
                        <i class="fas fa-user"></i> <span id="userName"></span>
                    </span>
                    <span class="meta-item">
                        <i class="fas fa-fire"></i> <span id="userLevel"></span>
                    </span>
                </div>
            </div>
            
            <!-- Schedule Display Area -->
            <div id="scheduleDisplay" class="schedule-content">
                Loading your personalized schedule...
            </div>
            
            <div class="action-buttons">
                <button onclick="saveSchedule()" class="btn-primary">
                    <i class="fas fa-save"></i> Save Schedule
                </button>
                <button onclick="printSchedule()" class="btn-primary">
                    <i class="fas fa-print"></i> Print
                </button>
                <a href="/dashboard" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Load and display the schedule
        document.addEventListener('DOMContentLoaded', function() {
            const savedSchedule = localStorage.getItem('currentSchedule');
            const displayElement = document.getElementById('scheduleDisplay');
            
            if (savedSchedule && savedSchedule.length > 50) {
                // Format the schedule for better readability
                let formattedSchedule = savedSchedule
                    .replace(/DAY \d+/g, match => `\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n${match}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`)
                    .replace(/•/g, '  •')
                    .replace(/\n{3,}/g, '\n\n')
                    .trim();
                
                displayElement.innerHTML = formattedSchedule;
                
                // Try to extract user info from schedule
                const nameMatch = savedSchedule.match(/For: ([^\n|]+)/i);
                const levelMatch = savedSchedule.match(/Level: ([^\n|]+)/i);
                
                if (nameMatch) document.getElementById('userName').textContent = nameMatch[1].trim();
                if (levelMatch) document.getElementById('userLevel').textContent = levelMatch[1].trim();
            } else {
                displayElement.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: #6b7280;">
                        <i class="fas fa-dumbbell" style="font-size: 4rem; margin-bottom: 1rem;"></i>
                        <h3>No schedule generated yet</h3>
                        <p>Go to Dashboard and click "Generate Workout Plan" to create your personalized schedule.</p>
                        <a href="/dashboard" style="display: inline-block; margin-top: 1rem; padding: 0.75rem 2rem; background: #6b46c1; color: white; text-decoration: none; border-radius: 0.5rem;">
                            Go to Dashboard
                        </a>
                    </div>
                `;
            }
        });
        
        function saveSchedule() {
            const schedule = localStorage.getItem('currentSchedule');
            if (schedule) {
                // Create a file to download
                const blob = new Blob([schedule], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'fitness-schedule.txt';
                a.click();
                window.URL.revokeObjectURL(url);
                
                // Show success message
                alert('✅ Schedule saved to your downloads!');
            } else {
                alert('No schedule to save!');
            }
        }
        
        function printSchedule() {
            const schedule = document.getElementById('scheduleDisplay').innerText;
            if (schedule) {
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head>
                            <title>Your Fitness Schedule</title>
                            <style>
                                body { font-family: Arial, sans-serif; padding: 2rem; line-height: 1.6; }
                                pre { white-space: pre-wrap; font-size: 14px; }
                            </style>
                        </head>
                        <body>
                            <pre>${schedule}</pre>
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            }
        }
    </script>
</body>
</html>
