<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Meal - FitAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="{{ url_for('static', filename='js/auto-translate.js') }}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: white;
        }
        
        .header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: white;
            color: #11998e;
        }
        
        /* Daily Progress Card */
        .stats-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stats-title {
            color: #4b5563;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
        }
        
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        
        .progress-item {
            text-align: center;
        }
        
        .progress-label {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .progress-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #11998e;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            margin: 0.5rem 0;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        /* Country Selection */
        .country-section {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .country-title {
            color: #11998e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .country-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .country-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 2rem;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .country-btn:hover {
            background: #11998e;
            color: white;
            border-color: #11998e;
        }
        
        .country-btn.active {
            background: #11998e;
            color: white;
            border-color: #11998e;
        }
        
        /* Meals Grid */
        .meals-section {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .meals-section.show {
            display: block;
        }
        
        .meals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .meal-option {
            background: #f9fafb;
            border-radius: 0.75rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .meal-option:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: #f3f4f6;
        }
        
        .meal-option.selected {
            border-color: #11998e;
            background: #e0f2fe;
        }
        
        .meal-name {
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 0.25rem;
        }
        
        .meal-cal {
            color: #11998e;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .meal-macros {
            color: #6b7280;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        /* Form Card */
        .form-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .form-title {
            color: #11998e;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.3rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        label i {
            color: #11998e;
            margin-right: 0.5rem;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #11998e;
        }
        
        .macro-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .macro-inputs {
                grid-template-columns: 1fr;
            }
        }

<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-utensils"></i>
                Log Your Meal
            </h1>
            <a href="/profile" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
        
        <!-- Daily Progress Card -->
        <div class="stats-card">
            <div class="stats-title">
                <i class="fas fa-chart-line"></i> Today's Progress
            </div>
            <div class="progress-grid">
                <div class="progress-item">
                    <div class="progress-label">Calories</div>
                    <div class="progress-value" id="caloriesProgress">0</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="caloriesBar" style="width: 0%"></div>
                    </div>
                    <div style="color: #6b7280; font-size: 0.8rem;">Goal: 2000</div>
                </div>
                <div class="progress-item">
                    <div class="progress-label">Protein</div>
                    <div class="progress-value" id="proteinProgress">0g</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="proteinBar" style="width: 0%"></div>
                    </div>
                    <div style="color: #6b7280; font-size: 0.8rem;">Goal: 100g</div>
                </div>
            </div>
        </div>
        
        <!-- Country Selection -->
        <div class="country-section">
            <h3 class="country-title">
                <i class="fas fa-globe"></i> Select Cuisine
            </h3>
            <div class="country-buttons" id="countryButtons">
                <button class="country-btn" data-country="indian">🇮🇳 Indian</button>
                <button class="country-btn" data-country="italian">🇮🇹 Italian</button>
                <button class="country-btn" data-country="japanese">🇯🇵 Japanese</button>
                <button class="country-btn" data-country="mexican">🇲🇽 Mexican</button>
                <button class="country-btn" data-country="american">🇺🇸 American</button>
                <button class="country-btn" data-country="thai">🇹🇭 Thai</button>
            </div>
        </div>
        
        <!-- Meals Grid -->
        <div class="meals-section" id="mealsSection">
            <h3 class="country-title">
                <i class="fas fa-utensils"></i> <span id="selectedCuisine">Indian</span> Cuisine Meals
            </h3>
            <div class="meals-grid" id="mealsGrid"></div>
        </div>
        
        <!-- Manual Entry Form -->
        <div class="form-card">
            <h2 class="form-title">
                <i class="fas fa-pen"></i> Or Enter Manually
            </h2>
            
            <form id="mealForm" onsubmit="logMeal(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Date</label>
                        <input type="date" id="mealDate" value="{{ now.date() }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> Meal Type</label>
                        <select id="mealType" required>
                            <option value="breakfast">🍳 Breakfast</option>
                            <option value="lunch">🍱 Lunch</option>
                            <option value="dinner">🍽️ Dinner</option>
                            <option value="snack">🥨 Snack</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label><i class="fas fa-utensils"></i> Food Name</label>
                        <input type="text" id="foodName" placeholder="e.g., Butter Chicken" required>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-fire"></i> Calories</label>
                        <input type="number" id="calories" min="0" placeholder="Calories" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label><i class="fas fa-chart-pie"></i> Macros (Optional)</label>
                        <div class="macro-inputs">
                            <div class="macro-input">
                                <input type="number" id="protein" min="0" placeholder="Protein (g)">
                                <div class="macro-unit">g</div>
                            </div>
                            <div class="macro-input">
                                <input type="number" id="carbs" min="0" placeholder="Carbs (g)">
                                <div class="macro-unit">g</div>
                            </div>
                            <div class="macro-input">
                                <input type="number" id="fats" min="0" placeholder="Fats (g)">
                                <div class="macro-unit">g</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fas fa-save"></i> Log Meal
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // Meal Database by Country
        const mealsByCountry = {
            indian: [
                { name: "Butter Chicken", calories: 450, protein: 30, carbs: 20, fats: 25 },

                { name: "Risotto", calories: 550, protein: 15, carbs: 80, fats: 20 },
                { name: "Caprese Salad", calories: 250, protein: 12, carbs: 10, fats: 18 },
                { name: "Fettuccine Alfredo", calories: 650, protein: 20, carbs: 75, fats: 30 }
            ],
            japanese: [
                { name: "Sushi Roll", calories: 350, protein: 15, carbs: 45, fats: 10 },
                { name: "Ramen", calories: 550, protein: 25, carbs: 70, fats: 20 },
                { name: "Teriyaki Chicken", calories: 400, protein: 35, carbs: 30, fats: 15 },
                { name: "Tempura", calories: 450, protein: 12, carbs: 40, fats: 25 },
                { name: "Miso Soup", calories: 50, protein: 3, carbs: 8, fats: 2 },
                { name: "Donburi", calories: 500, protein: 28, carbs: 65, fats: 18 }
            ],
            mexican: [
                { name: "Tacos", calories: 400, protein: 20, carbs: 35, fats: 20 },
                { name: "Burrito", calories: 700, protein: 30, carbs: 80, fats: 25 },
                { name: "Quesadilla", calories: 500, protein: 25, carbs: 40, fats: 25 },
                { name: "Enchiladas", calories: 550, protein: 28, carbs: 50, fats: 28 },
                { name: "Guacamole", calories: 150, protein: 2, carbs: 8, fats: 12 },
                { name: "Chiles Rellenos", calories: 450, protein: 20, carbs: 35, fats: 25 }
            ],
            american: [
                { name: "Burger", calories: 600, protein: 30, carbs: 45, fats: 35 },
                { name: "Grilled Cheese", calories: 350, protein: 15, carbs: 30, fats: 20 },
                { name: "Mac & Cheese", calories: 500, protein: 18, carbs: 55, fats: 25 },
                { name: "BBQ Ribs", calories: 700, protein: 40, carbs: 30, fats: 45 },
                { name: "Caesar Salad", calories: 400, protein: 18, carbs: 15, fats: 30 },
                { name: "Pancakes", calories: 300, protein: 8, carbs: 45, fats: 10 }
            ],
            thai: [
                { name: "Pad Thai", calories: 500, protein: 20, carbs: 65, fats: 18 },
                { name: "Green Curry", calories: 450, protein: 25, carbs: 30, fats: 25 },
                { name: "Tom Yum Soup", calories: 150, protein: 10, carbs: 15, fats: 5 },
                { name: "Massaman Curry", calories: 550, protein: 28, carbs: 40, fats: 30 },
                { name: "Som Tum", calories: 200, protein: 3, carbs: 30, fats: 8 },
                { name: "Thai Fried Rice", calories: 450, protein: 15, carbs: 65, fats: 15 }
            ]
        };
        
        let currentCountry = 'indian';
        
        // Load daily totals
        async function loadDailyTotals() {
            try {
                const response = await fetch('/get-daily-totals');
                const data = await response.json();
                updateProgressBars(data);
            } catch (error) {
                console.error('Error loading daily totals:', error);
            }
        }
        
        function updateProgressBars(data) {
            const calorieGoal = 2000;
            const proteinGoal = 100;
            
            document.getElementById('caloriesProgress').innerText = data.calories || 0;
            document.getElementById('caloriesBar').style.width = Math.min(100, ((data.calories || 0) / calorieGoal * 100)) + '%';
            document.getElementById('proteinProgress').innerText = (data.protein || 0) + 'g';
            document.getElementById('proteinBar').style.width = Math.min(100, ((data.protein || 0) / proteinGoal * 100)) + '%';
        }
        
        // Country selection
        function selectCountry(country) {
            currentCountry = country;
            
            // Update active button
            document.querySelectorAll('.country-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-country') === country) {
                    btn.classList.add('active');
                }
            });
            
            // Show meals section
            document.getElementById('mealsSection').classList.add('show');
            document.getElementById('selectedCuisine').innerText = country.charAt(0).toUpperCase() + country.slice(1);
            
            // Load meals
            const meals = mealsByCountry[country] || [];
            const mealsGrid = document.getElementById('mealsGrid');
            
            mealsGrid.innerHTML = meals.map(meal => `
                <div class="meal-option" onclick="selectMeal('${meal.name}', ${meal.calories}, ${meal.protein}, ${meal.carbs}, ${meal.fats})">
                    <div class="meal-name">${meal.name}</div>
                    <div class="meal-cal">🔥 ${meal.calories} cal</div>
                    <div class="meal-macros">🥩 ${meal.protein}g | 🍚 ${meal.carbs}g | 🧈 ${meal.fats}g</div>
                </div>
            `).join('');
        }
        
        // Select a meal and fill form
        function selectMeal(name, calories, protein, carbs, fats) {
            document.getElementById('foodName').value = name;

document.getElementById('calories').value = calories;
            document.getElementById('protein').value = protein;
            document.getElementById('carbs').value = carbs;
            document.getElementById('fats').value = fats;
            
            // Highlight selected meal
            document.querySelectorAll('.meal-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // Scroll to form
            document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
        }
        
        // Log meal function
        async function logMeal(event) {
            event.preventDefault();
            
            const meal = {
                meal_type: document.getElementById('mealType').value,
                food_name: document.getElementById('foodName').value,
                calories: parseInt(document.getElementById('calories').value),
                protein: parseFloat(document.getElementById('protein').value) || 0,
                carbs: parseFloat(document.getElementById('carbs').value) || 0,
                fats: parseFloat(document.getElementById('fats').value) || 0,
                date: document.getElementById('mealDate').value
            };
            
            if (!meal.food_name || !meal.calories) {
                alert('Please enter food name and calories');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging...';
            
            try {
                const response = await fetch('/log-meal', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(meal)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    await loadDailyTotals();
                    alert('✅ Meal logged successfully!');
                    document.getElementById('mealForm').reset();
                    document.getElementById('mealDate').value = new Date().toISOString().split('T')[0];
                    document.getElementById('mealType').value = 'lunch';
                } else {
                    alert('❌ Failed to log meal');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error logging meal');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Log Meal';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set today's date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('mealDate').value = today;
            
            // Load daily totals
            loadDailyTotals();
            
            // Set default country buttons
            document.querySelectorAll('.country-btn').forEach(btn => {
                btn.addEventListener('click', () => selectCountry(btn.getAttribute('data-country')));
            });
            
            // Select Indian cuisine by default
            selectCountry('indian');
        });
    </script>
</body>
</html>
