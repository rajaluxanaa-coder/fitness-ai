<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Progress - FitAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/auto-translate.js') }}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 2.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            color: #6b46c1;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #1f2937;
        }
        
        .stat-label {
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .chart-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .chart-card h3 {
            color: #4b5563;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .timeline {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .timeline-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.3s;
        }
        
        .timeline-item:hover {
            background: #f9fafb;
        }
        
        .timeline-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #6b46c1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .timeline-content {
            flex: 1;
        }
        
        .timeline-date {
            color: #9ca3af;
            font-size: 0.875rem;
        }
        
        .timeline-title {
            font-weight: 600;
            color: #1f2937;
        }
        
        .timeline-stats {
            display: flex;
            gap: 1rem;
            color: #6b7280;
            font-size: 0.875rem;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .animate {
            animation: slideIn 0.5s ease-out forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

<body>
    <div class="container">
        <h1>
            <i class="fas fa-chart-line"></i>
            Your Progress Journey
        </h1>
        
        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card animate">
                <div class="stat-icon">🏋️</div>
                <div class="stat-value" id="totalWorkouts">0</div>
                <div class="stat-label">Total Workouts</div>
            </div>
            
            <div class="stat-card animate delay-1">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="totalCalories">0</div>
                <div class="stat-label">Calories Burned</div>
            </div>
            
            <div class="stat-card animate delay-2">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value" id="totalMinutes">0</div>
                <div class="stat-label">Minutes</div>
            </div>
            
            <div class="stat-card animate delay-3">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="currentStreak">0</div>
                <div class="stat-label">Day Streak</div>
            </div>
        </div>
        
        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card animate">
                <h3><i class="fas fa-weight"></i> Workouts Per Week</h3>
                <canvas id="workoutsChart"></canvas>
            </div>
            
            <div class="chart-card animate delay-2">
                <h3><i class="fas fa-fire"></i> Calories Burned Trend</h3>
                <canvas id="caloriesChart"></canvas>
            </div>
        </div>
        
        <!-- Activity Timeline -->
        <div class="timeline animate">
            <h3 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-history"></i> Recent Activity
            </h3>
            <div id="timeline"></div>
        </div>
        
        <!-- Workout Split Chart -->
        <div class="chart-card animate">
            <h3><i class="fas fa-chart-pie"></i> Workout Distribution</h3>
            <canvas id="pieChart" style="max-height: 300px;"></canvas>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <a href="/profile" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Profile
            </a>
            <a href="/log-workout" class="btn-primary" style="margin-left: 1rem;">
                <i class="fas fa-plus"></i> Log New Workout
            </a>
        </div>
    </div>
    
    <style>
        .btn-primary {
            background: white;
            color: #6b46c1;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary:hover {
            background: #f3f4f6;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-secondary:hover {
            background: white;
            color: #6b46c1;
        }
    </style>
    
    <script>
    async function loadProgressData() {
    try {
        const response = await fetch('/get-progress-data');
        const data = await response.json();
        
        console.log("Progress data received:", data);
        
        if (data.success === false) {
            console.error("Error:", data.error);
            return;
        }
        
        // Update stats
        document.getElementById('totalWorkouts').innerText = data.totalWorkouts || 0;
        document.getElementById('totalCalories').innerText = (data.totalCaloriesBurned || 0).toLocaleString();
        document.getElementById('totalMinutes').innerText = data.totalMinutes || 0;
        document.getElementById('currentStreak').innerText = data.streak || 0;
        
        // Workouts Chart
        const ctx = document.getElementById('workoutsChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.weekLabels || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Workouts',
                    data: data.weeklyWorkouts || [0,0,0,0,0,0,0],
                    borderColor: '#6b46c1',
                    backgroundColor: 'rgba(107, 70, 193, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1,           // Show 1, 2, 3...
                            precision: 0,           // No decimals
                            callback: function(value) {
                                return Number.isInteger(value) ? value : null;
                            }
                        },
                        title: {
                            display: true,
                            text: 'Number of Workouts'
                        }
                    }
                }
            }
        });
        
        // Calories Chart
        const ctx2 = document.getElementById('caloriesChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: data.weekLabels || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Calories',
                    data: data.weeklyCalories || [0,0,0,0,0,0,0],
                    backgroundColor: '#6b46c1',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                }
            }
        });
        
        // Workout Distribution Pie Chart
        const ctx3 = document.getElementById('pieChart').getContext('2d');
        
        // Calculate workout distribution from recent activity
        let workoutTypes = {};
        if (data.recentActivity && data.recentActivity.length > 0) {
            data.recentActivity.forEach(activity => {
                if (activity.icon === 'fa-dumbbell') {
                    workoutTypes[activity.title] = (workoutTypes[activity.title] || 0) + 1;
                }
            });
        }
        
        // If no data, show sample data
        const labels = Object.keys(workoutTypes).length > 0 ? Object.keys(workoutTypes) : ['Upper Body', 'Lower Body', 'Cardio', 'Core'];
        const values = Object.keys(workoutTypes).length > 0 ? Object.values(workoutTypes) : [4, 3, 2, 1];
        
        new Chart(ctx3, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#6b46c1', '#38a169', '#fbbf24', '#e53e3e', '#dd6b20', '#3182ce'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
        
        // Timeline
        const timeline = document.getElementById('timeline');
        if (timeline) {
            timeline.innerHTML = '';
            if (data.recentActivity && data.recentActivity.length > 0) {
                data.recentActivity.forEach(activity => {
                    timeline.innerHTML += `
                        <div class="timeline-item">
                            <div class="timeline-icon">
                                <i class="fas ${activity.icon}"></i>
                            </div>
                            <div class="timeline-content">
                                <div class="timeline-date">${activity.date}</div>
                                <div class="timeline-title">${activity.title}</div>
                                <div class="timeline-stats">
                                    <span>🔥 ${activity.calories} cal</span>
                                    <span>⏱️ ${activity.duration} min</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                timeline.innerHTML = '<p style="text-align: center; color: #6b7280;">No workouts logged yet</p>';
            }
        }
        
    } catch (error) {
        console.error('Error loading progress data:', error);
    }
}
            
    
                     
    // Load data when page loads
    document.addEventListener('DOMContentLoaded', function() {
        loadProgressData();
    });
</script>
        </body>
